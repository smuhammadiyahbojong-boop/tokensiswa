<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Ujian SMK</title>
    <style>
        body { 
            font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; flex-direction: column; 
            user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none;
        }
        .kotak { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
        .kotak-login { max-width: 350px; text-align: center; }
        input[type="text"], select { box-sizing: border-box; width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        .btn-utama { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .kotak-ujian { max-width: 800px; display: none; }
        .header-ujian { display: flex; justify-content: space-between; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; align-items: center; }
        .timer { font-size: 28px; font-weight: bold; color: #dc3545; background: #ffeeba; padding: 5px 15px; border-radius: 5px; }
        .opsi-jawaban { display: block; background: #f8f9fa; padding: 10px 15px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ddd; cursor: pointer; }
        .img-opsi { display: block; max-width: 200px; margin-top: 10px; border-radius: 4px; border: 1px solid #ccc; }
        .navigasi-bawah { display: flex; justify-content: space-between; margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .btn-nav { padding: 10px 20px; font-size: 16px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div id="halaman-login" class="kotak kotak-login">
        <h2>LOGIN CBT SMK</h2>
        <select id="mapel">
            <option value="Bahasa Indonesia">Bahasa Indonesia</option>
            <option value="Broadcasting" disabled>Dasar Broadcasting & Perfilman (Belum Mulai)</option>
            <option value="Coding" disabled>Coding & Artificial Intelligence (Belum Mulai)</option>
        </select>
        <input type="text" id="nis" placeholder="Masukkan Username/NIS">
        <input type="text" id="token" placeholder="Token Ujian">
        <button class="btn-utama" onclick="prosesLogin()">MASUK UJIAN</button>
        <p id="pesan"></p>
    </div>

    <div id="halaman-ujian" class="kotak kotak-ujian">
        <div class="header-ujian">
            <div class="identitas">
                <h3 id="judul-mapel">CBT SMK</h3>
                <p id="info-siswa">Siswa: -</p>
            </div>
            <div class="timer" id="waktu-ujian">60:00</div>
        </div>
        <div id="area-soal"></div>
        <div id="area-navigasi" class="navigasi-bawah" style="display: none;">
            <button id="btn-prev" class="btn-nav" style="background:#6c757d" onclick="gantiSoal(-1)">Kembali</button>
            <button id="btn-next" class="btn-nav" style="background:#007bff">Selanjutnya</button>
        </div>
    </div>

    <script>
        const URL_API = "https://script.google.com/macros/s/AKfycbzAkFQPW7JWlN68BT4NJIAXxKGEkfGmPpCPI_aAJZx4a7G-vuOWECKk113L3ubMT9lB/exec";
        
        const jadwalUjian = {
            "Bahasa Indonesia": { tanggal: "2026-03-09", buka: "07:30", tutup: "23:59" },
            "Broadcasting": { tanggal: "2026-03-10", buka: "08:45", tutup: "23:59" },
            "Coding": { tanggal: "2026-03-11", buka: "10:00", tutup: "23:59" }
        };

        let bankSoal = [], indexSoalSaatIni = 0, jawabanSiswa = {}, nisSiswaAktif = "", mapelAktif = "", durasiUjian = 3600, timerInterval, jumlahPelanggaran = 0;

        function eksekusiTilang() {
            if (document.getElementById("halaman-ujian").style.display === "block" && jumlahPelanggaran !== -999) {
                jumlahPelanggaran++;
                if (jumlahPelanggaran < 3) {
                    alert(`⚠️ PERINGATAN (${jumlahPelanggaran}/3)!\nSistem mendeteksi Anda keluar layar atau menggunakan layar belah.`);
                } else {
                    alert("⛔ PELANGGARAN MAKSIMAL! Ujian dibatalkan otomatis.");
                    resetKeLogin("Ujian dibatalkan (3x Keluar).");
                }
            }
        }
        window.addEventListener("blur", eksekusiTilang);

        function resetKeLogin(pesanError) {
            clearInterval(timerInterval);
            document.getElementById("halaman-ujian").style.display = "none";
            document.getElementById("halaman-login").style.display = "block";
            document.getElementById("nis").value = "";
            document.getElementById("token").value = "";
            document.getElementById("pesan").style.color = "red";
            document.getElementById("pesan").innerText = pesanError;
            jumlahPelanggaran = 0; jawabanSiswa = {}; durasiUjian = 3600;
        }

        function prosesLogin() {
            let nis = document.getElementById("nis").value, token = document.getElementById("token").value, mapel = document.getElementById("mapel").value;
            let pesan = document.getElementById("pesan");
            
            let sekarang = new Date();
            let tglSkrg = sekarang.getFullYear() + "-" + (sekarang.getMonth() + 1).toString().padStart(2, '0') + "-" + sekarang.getDate().toString().padStart(2, '0');
            let jamSkrg = sekarang.getHours().toString().padStart(2, '0') + ":" + sekarang.getMinutes().toString().padStart(2, '0');
            let jadwal = jadwalUjian[mapel];

            if (tglSkrg !== jadwal.tanggal) { pesan.style.color = "red"; pesan.innerText = `❌ Ujian dijadwalkan tanggal ${jadwal.tanggal}`; return; }
            if (jamSkrg < jadwal.buka) { pesan.style.color = "orange"; pesan.innerText = `⏳ Belum dibuka! Mulai pukul ${jadwal.buka}`; return; }
            if (jamSkrg > jadwal.tutup) { pesan.style.color = "red"; pesan.innerText = `🚫 Waktu akses habis pukul ${jadwal.tutup}`; return; }

            pesan.style.color = "blue"; pesan.innerText = "Verifikasi akses...";
            fetch(`${URL_API}?action=login&nis=${nis}&token=${token}&mapel=${mapel}`).then(r => r.json()).then(d => {
                if(d.status === "sukses") {
                    nisSiswaAktif = nis; mapelAktif = mapel;
                    document.getElementById("halaman-login").style.display = "none";
                    document.getElementById("halaman-ujian").style.display = "block";
                    document.getElementById("info-siswa").innerText = `Siswa: ${d.data.nama}`;
                    document.getElementById("judul-mapel").innerText = "UJIAN " + mapel.toUpperCase();
                    mulaiUjian();
                } else { 
                    pesan.style.color = "red"; 
                    pesan.innerText = "Akses Ditolak! Cek Token atau Administrasi Pembayaran."; 
                }
            });
        }

        function mulaiUjian() {
            timerInterval = setInterval(() => {
                durasiUjian--;
                let m = Math.floor(durasiUjian/60), s = durasiUjian%60;
                document.getElementById("waktu-ujian").innerText = `${m}:${s.toString().padStart(2,'0')}`;
                if(durasiUjian<=0) { clearInterval(timerInterval); kirimJawaban(); }
            }, 1000);
            fetch(`${URL_API}?action=getSoal&mapel=${mapelAktif}`).then(r => r.json()).then(d => {
                bankSoal = d.data; document.getElementById("area-navigasi").style.display = "flex"; tampilkanSoal(0);
            });
        }

        function tampilkanSoal(idx) {
            indexSoalSaatIni = idx;
            let s = bankSoal[idx], j = jawabanSiswa[s.id_soal.toString()] || "";
            let imgQ = s.link_gambar ? `<img src="${s.link_gambar}" style="max-width:100%; margin-bottom:15px;">` : "";
            const renderOpsi = (label, teks, img) => `
                <label class="opsi-jawaban">
                    <input type="radio" name="q" onchange="simpanPilihan('${s.id_soal}', '${label}')" ${j===label?'checked':''}> 
                    <b>${label}.</b> ${teks}
                    ${img ? `<img src="${img}" class="img-opsi">` : ""}
                </label>`;
            document.getElementById("area-soal").innerHTML = `
                ${imgQ} <p><b>${idx+1}. ${s.pertanyaan}</b></p>
                ${renderOpsi('A', s.pil_a, s.img_a)} ${renderOpsi('B', s.pil_b, s.img_b)}
                ${renderOpsi('C', s.pil_c, s.img_c)} ${renderOpsi('D', s.pil_d, s.img_d)}
                ${renderOpsi('E', s.pil_e, s.img_e)}
            `;
            let btn = document.getElementById("btn-next");
            btn.innerText = idx === bankSoal.length-1 ? "SELESAI" : "Selanjutnya";
            btn.style.background = idx === bankSoal.length-1 ? "#dc3545" : "#007bff";
            btn.onclick = idx === bankSoal.length-1 ? konfirmasiSelesai : () => tampilkanSoal(idx+1);
        }

        function simpanPilihan(idSoal, label) { jawabanSiswa[idSoal.toString()] = label; }

        function konfirmasiSelesai() {
            let backupTilang = jumlahPelanggaran;
            jumlahPelanggaran = -999; 
            let belumDijawab = [];
            bankSoal.forEach((soal) => { if (!jawabanSiswa[soal.id_soal.toString()]) belumDijawab.push(soal.id_soal); });

            if (belumDijawab.length > 0) {
                alert(`⚠️ BELUM LENGKAP!\n\nMasih ada ${belumDijawab.length} soal yang belum dijawab.\nID Soal: ${belumDijawab.join(", ")}\n\nSilakan cek kembali.`);
                setTimeout(() => { jumlahPelanggaran = backupTilang; }, 500);
            } else {
                if (confirm("Yakin ingin mengirim jawaban sekarang?")) { 
                    clearInterval(timerInterval); 
                    kirimJawaban(); 
                } else {
                    setTimeout(() => { jumlahPelanggaran = backupTilang; }, 500);
                }
            }
        }

        function kirimJawaban() {
            jumlahPelanggaran = -999;
            document.getElementById("area-soal").innerHTML = "<h2>Sedang menyimpan nilai...</h2>";
            fetch(`${URL_API}?action=submit&nis=${nisSiswaAktif}&mapel=${mapelAktif}&jawaban=${encodeURIComponent(JSON.stringify(jawabanSiswa))}`)
            .then(() => { 
                alert("Jawaban Berhasil Terkirim!");
                resetKeLogin("Ujian sebelumnya sukses disimpan.");
                document.getElementById("pesan").style.color = "green";
            });
        }

        function gantiSoal(arah) { if(bankSoal[indexSoalSaatIni+arah]) tampilkanSoal(indexSoalSaatIni+arah); }
    </script>
</body>
</html>
